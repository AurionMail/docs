# ==============================================================================
# GLOBAL CONFIGURATION & PATHS
# ==============================================================================
# Domain name shared by the Core (Web/API) and the Proxy (SMTP port 25)
DOMAIN=aurion.example.com

CORE_DIR=/var/www/aurion
PROXY_DIR=/var/www/aurion-proxy

# System user that will execute the services
APP_USER=www-data

# ==============================================================================
# CORE SERVER CONFIGURATION (.env)
# ==============================================================================
CORE_APP_ENV=production
CORE_APP_PORT=8080

DB_HOST=localhost
DB_PORT=5432
DB_USER=aurionuser
DB_PASS=coolpassword
DB_NAME=auriondb

MAIL_BACKEND=jmap  
JMAP_URL=http://mail.aurion.example.com
STALWART_API_KEY=your_stalwart_api_key_here

# Authentication salt secret (automatically generated by the script if left empty)
AUTH_FAKE_SALT_SECRET=""

# ==============================================================================
# SMTP PROXY CONFIGURATION (.env)
# ==============================================================================
PROXY_LISTEN_ADDR=:25
PROXY_MAX_MESSAGE_BYTES=10485760 # 10 MiB
PROXY_FORWARD_ADDR=127.0.0.1:10025
PROXY_QUEUE_SIZE=1000
PROXY_WORKER_COUNT=4

# TLS Configuration for incoming SMTP traffic (Optional)
# Leave these empty to disable TLS (plain text SMTP) during initial setup.
# Example paths if using Let's Encrypt:
# PROXY_TLS_CERT=/etc/letsencrypt/live/aurion.example.com/fullchain.pem
# PROXY_TLS_KEY=/etc/letsencrypt/live/aurion.example.com/privkey.pem
PROXY_TLS_CERT=""
PROXY_TLS_KEY=""