# ==============================================================================
# ⚙️ Bulwark Webmail - Production Installation Configuration
# ==============================================================================

# System and Infrastructure Variables
APP_USER="www-data"
DOMAIN="mail.your-domain.com"
DEPLOY_DIR="/var/www/bulwark-webmail"

# GitHub Repository Specification (Format: Organization/RepositoryName)
GITHUB_REPO="AurionMail/bulwarmail-e2e"

# Node.js Port Configuration (Internal listener)
PORT=3000
HOSTNAME="127.0.0.1"

# Runtime Environment Variables (Injected into .env.local)
JMAP_SERVER_URL="https://mail.your-domain.com"
APP_NAME="Bulwark Webmail"
STALWART_FEATURES=true
# openssl rand -base64 32
SESSION_SECRET="CHANGE_ME_OR_GENERATE_WITH_OPENSSL"